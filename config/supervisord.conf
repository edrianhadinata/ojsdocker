[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/apache2_err.log
stdout_logfile=/var/log/supervisor/apache2_out.log
environment=APACHE_RUN_USER="www-data",APACHE_RUN_GROUP="www-data"

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/cron_err.log
stdout_logfile=/var/log/supervisor/cron_out.log
