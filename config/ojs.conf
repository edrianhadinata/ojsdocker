<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    ServerName ${SERVERNAME}
    DocumentRoot /var/www/html

    # ─── Directory OJS ─────────────────────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Aktifkan mod_rewrite untuk URL cantik OJS
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php/$1 [L]
    </Directory>

    # ─── Blokir akses ke file sensitif ───────────────────────────────────
    <FilesMatch "^(config\.inc\.php|dbscripts|lib|locale|registry|tools|templates|plugins/.*/locale|plugins/.*/templates)">
        Require all denied
    </FilesMatch>

    # ─── Security Headers ─────────────────────────────────────────────────
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ─── Cache Static Assets ─────────────────────────────────────────────
    <LocationMatch "\.(css|js|gif|png|jpg|jpeg|ico|woff|woff2|ttf|svg)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 month"
        Header append Cache-Control "public"
    </LocationMatch>

    # ─── Gzip Compression ────────────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css application/javascript application/json
    </IfModule>

    # ─── Log ─────────────────────────────────────────────────────────────
    ErrorLog /var/log/apache2/ojs_error.log
    CustomLog /var/log/apache2/ojs_access.log combined
</VirtualHost>
